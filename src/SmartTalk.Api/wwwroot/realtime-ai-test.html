<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartTalk Realtime AI Test</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --line: #334155;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22c55e;
      --danger: #ef4444;
      --warn: #f59e0b;
      --btn: #1d4ed8;
      --btn-hover: #1e40af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #1e293b, var(--bg));
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: color-mix(in srgb, var(--panel) 92%, black);
      padding: 16px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      margin: 0;
    }

    .row {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(12, 1fr);
      margin-top: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
    }

    input, textarea, button {
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #0b1220;
      color: var(--text);
      padding: 10px;
      font-size: 14px;
      width: 100%;
    }

    textarea { resize: vertical; min-height: 82px; }

    button {
      background: var(--btn);
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover { background: var(--btn-hover); }
    button.danger { background: #b91c1c; }
    button.warn { background: #b45309; }
    button.success { background: #15803d; }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .status-line {
      margin-top: 8px;
      font-size: 13px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
      background: var(--danger);
    }

    .dot.connected { background: var(--accent); }
    .dot.connecting { background: var(--warn); }

    .grid-2 {
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr 1fr;
    }

    .log {
      min-height: 320px;
      max-height: 430px;
      overflow: auto;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #020617;
    }

    .line {
      margin: 0 0 5px;
      color: #cbd5e1;
    }

    .line.error { color: #fca5a5; }
    .line.in { color: #93c5fd; }
    .line.out { color: #86efac; }

    @media (max-width: 880px) {
      body { padding: 12px; }
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>SmartTalk Realtime AI WebSocket Test</h1>
    <p class="hint">Connect to your endpoint, stream mic audio as PCM16/24kHz base64, receive and play AI audio in real time.</p>

    <div class="row">
      <div class="field" style="grid-column: span 9;">
        <label for="wsUrl">WebSocket URL</label>
        <input id="wsUrl" value="wss://smarttalktest.yamimeal.ca/api/RealtimeAi/claw/connect/123" />
      </div>
      <div class="field" style="grid-column: span 3;">
        <label for="apiKey">API Key (optional)</label>
        <input id="apiKey" placeholder="optional" />
      </div>
    </div>

    <div class="row">
      <div class="field" style="grid-column: span 6;">
        <label for="extraProtocols">Extra WebSocket Subprotocols (comma separated, optional)</label>
        <input id="extraProtocols" placeholder="example.protocol.v1" />
      </div>
      <div class="field" style="grid-column: span 6;">
        <label for="note">Notes</label>
        <input id="note" readonly value="If API key is needed, browser will send subprotocol: X-API-KEY.<your_key>" />
      </div>
    </div>

    <div class="row">
      <div style="grid-column: span 2;"><button id="connectBtn">Connect</button></div>
      <div style="grid-column: span 2;"><button id="disconnectBtn" class="danger" disabled>Disconnect</button></div>
      <div style="grid-column: span 2;"><button id="startMicBtn" class="success" disabled>Start Mic</button></div>
      <div style="grid-column: span 2;"><button id="stopMicBtn" class="warn" disabled>Stop Mic</button></div>
      <div style="grid-column: span 2;"><button id="clearLogBtn">Clear Log</button></div>
      <div style="grid-column: span 2;"><button id="sendPingBtn">Send Ping Text</button></div>
    </div>

    <div class="status-line">
      <span id="statusDot" class="dot"></span>
      <strong id="statusText">Disconnected</strong>
      <span class="hint" id="sessionLabel">Session: -</span>
    </div>
  </div>

  <div class="card">
    <div class="row" style="margin-top: 0;">
      <div class="field" style="grid-column: span 10;">
        <label for="textInput">Send Text Message</label>
        <input id="textInput" placeholder="Type your text here and click Send" />
      </div>
      <div style="grid-column: span 2; align-self: end;"><button id="sendTextBtn" disabled>Send</button></div>
    </div>
  </div>

  <div class="grid-2">
    <div class="card">
      <h3 style="margin-top:0;">Transcriptions</h3>
      <div id="transcriptLog" class="log"></div>
    </div>
    <div class="card">
      <h3 style="margin-top:0;">Socket Log</h3>
      <div id="socketLog" class="log"></div>
    </div>
  </div>
</div>

<script>
  const TARGET_SAMPLE_RATE = 24000;

  const wsUrlEl = document.getElementById("wsUrl");
  const apiKeyEl = document.getElementById("apiKey");
  const extraProtocolsEl = document.getElementById("extraProtocols");
  const statusDotEl = document.getElementById("statusDot");
  const statusTextEl = document.getElementById("statusText");
  const sessionLabelEl = document.getElementById("sessionLabel");

  const connectBtn = document.getElementById("connectBtn");
  const disconnectBtn = document.getElementById("disconnectBtn");
  const startMicBtn = document.getElementById("startMicBtn");
  const stopMicBtn = document.getElementById("stopMicBtn");
  const clearLogBtn = document.getElementById("clearLogBtn");
  const sendPingBtn = document.getElementById("sendPingBtn");
  const sendTextBtn = document.getElementById("sendTextBtn");
  const textInputEl = document.getElementById("textInput");

  const socketLogEl = document.getElementById("socketLog");
  const transcriptLogEl = document.getElementById("transcriptLog");

  let ws = null;
  let currentSessionId = "-";

  let micStream = null;
  let micContext = null;
  let micSource = null;
  let micProcessor = null;

  let playContext = null;
  let nextPlaybackTime = 0;
  let sentAudioChunks = 0;
  let receivedAudioChunks = 0;

  function setStatus(status, text) {
    statusDotEl.classList.remove("connected", "connecting");
    if (status === "connected") statusDotEl.classList.add("connected");
    if (status === "connecting") statusDotEl.classList.add("connecting");
    statusTextEl.textContent = text;
  }

  function logLine(container, text, cssClass) {
    const line = document.createElement("div");
    line.className = "line" + (cssClass ? " " + cssClass : "");
    line.textContent = `[${new Date().toLocaleTimeString()}] ${text}`;
    container.appendChild(line);
    if (container.childElementCount > 350) {
      container.removeChild(container.firstChild);
    }
    container.scrollTop = container.scrollHeight;
  }

  function logSocket(text, cls) { logLine(socketLogEl, text, cls); }
  function logTranscript(text, cls) { logLine(transcriptLogEl, text, cls); }

  function updateButtons() {
    const connected = ws && ws.readyState === WebSocket.OPEN;
    connectBtn.disabled = connected;
    disconnectBtn.disabled = !connected;
    sendTextBtn.disabled = !connected;
    startMicBtn.disabled = !connected || !!micProcessor;
    stopMicBtn.disabled = !micProcessor;
  }

  function parseProtocols() {
    const protocols = [];

    const apiKey = apiKeyEl.value.trim();
    if (apiKey) {
      protocols.push(`X-API-KEY.${apiKey}`);
    }

    const extras = extraProtocolsEl.value
      .split(",")
      .map(x => x.trim())
      .filter(Boolean);

    for (const p of extras) {
      if (!protocols.includes(p)) protocols.push(p);
    }

    return protocols;
  }

  function base64ToArrayBuffer(base64) {
    const binary = atob(base64);
    const len = binary.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) {
      bytes[i] = binary.charCodeAt(i);
    }
    return bytes.buffer;
  }

  function arrayBufferToBase64(buffer) {
    const bytes = new Uint8Array(buffer);
    let binary = "";
    for (let i = 0; i < bytes.length; i++) {
      binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary);
  }

  function downsampleBuffer(floatBuffer, inputSampleRate, outputSampleRate) {
    if (outputSampleRate === inputSampleRate) return floatBuffer;
    if (outputSampleRate > inputSampleRate) {
      throw new Error("Output sample rate must be <= input sample rate");
    }

    const ratio = inputSampleRate / outputSampleRate;
    const newLength = Math.round(floatBuffer.length / ratio);
    const result = new Float32Array(newLength);

    let offsetResult = 0;
    let offsetBuffer = 0;

    while (offsetResult < result.length) {
      const nextOffsetBuffer = Math.round((offsetResult + 1) * ratio);
      let accum = 0;
      let count = 0;

      for (let i = offsetBuffer; i < nextOffsetBuffer && i < floatBuffer.length; i++) {
        accum += floatBuffer[i];
        count++;
      }

      result[offsetResult] = count > 0 ? (accum / count) : 0;
      offsetResult++;
      offsetBuffer = nextOffsetBuffer;
    }

    return result;
  }

  function floatTo16BitPCM(floatBuffer) {
    const out = new Int16Array(floatBuffer.length);

    for (let i = 0; i < floatBuffer.length; i++) {
      const s = Math.max(-1, Math.min(1, floatBuffer[i]));
      out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
    }

    return out;
  }

  function int16ToFloat32(int16Array) {
    const out = new Float32Array(int16Array.length);
    for (let i = 0; i < int16Array.length; i++) {
      out[i] = int16Array[i] / 32768;
    }
    return out;
  }

  async function ensurePlaybackContext() {
    if (!playContext) {
      playContext = new AudioContext({ sampleRate: TARGET_SAMPLE_RATE });
      nextPlaybackTime = 0;
    }

    if (playContext.state !== "running") {
      await playContext.resume();
    }
  }

  async function playPcm16Base64(base64Payload) {
    await ensurePlaybackContext();

    const buffer = base64ToArrayBuffer(base64Payload);
    const pcm = new Int16Array(buffer);
    const floatData = int16ToFloat32(pcm);

    const audioBuffer = playContext.createBuffer(1, floatData.length, TARGET_SAMPLE_RATE);
    audioBuffer.getChannelData(0).set(floatData);

    const source = playContext.createBufferSource();
    source.buffer = audioBuffer;
    source.connect(playContext.destination);

    const now = playContext.currentTime;
    if (nextPlaybackTime < now) {
      nextPlaybackTime = now + 0.02;
    }

    source.start(nextPlaybackTime);
    nextPlaybackTime += audioBuffer.duration;
  }

  function sendJson(payload, kind = "out") {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      logSocket("send failed: websocket is not open", "error");
      return;
    }

    const text = JSON.stringify(payload);
    ws.send(text);
    logSocket(text, kind);
  }

  function sendAudioChunk(base64Payload) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    ws.send(JSON.stringify({
      media: {
        type: "audio",
        payload: base64Payload
      }
    }));

    sentAudioChunks += 1;
    if (sentAudioChunks % 20 === 1) {
      logSocket(`audio out chunks=${sentAudioChunks}, latest_b64_len=${base64Payload.length}`, "out");
    }
  }

  function extractTranscriptText(message) {
    const d = message.Data || message.data;
    const t = d && (d.transcriptionData || d.TranscriptionData || d.transcription || d.Transcription);
    if (!t) return "";
    return t.Transcript || t.transcript || "";
  }

  function onServerMessage(raw) {
    let msg;
    try {
      msg = JSON.parse(raw);
    } catch {
      logSocket(raw, "in");
      return;
    }

    if (msg.session_id) {
      currentSessionId = msg.session_id;
      sessionLabelEl.textContent = `Session: ${currentSessionId}`;
    }

    const type = msg.type || "";

    if (type === "ResponseAudioDelta") {
      const base64 = msg.Data && (msg.Data.Base64Payload || msg.Data.base64Payload);
      if (base64) {
        receivedAudioChunks += 1;
        if (receivedAudioChunks % 20 === 1) {
          logSocket(`audio in chunks=${receivedAudioChunks}, latest_b64_len=${base64.length}`, "in");
        }
        playPcm16Base64(base64).catch(err => logSocket(`audio playback error: ${err.message}`, "error"));
      }
      return;
    }

    if (type.includes("Transcription")) {
      logSocket(raw, "in");
      const txt = extractTranscriptText(msg);
      if (txt) {
        logTranscript(`${type}: ${txt}`, "in");
      }
      return;
    }

    if (type === "SpeechDetected") {
      logSocket(raw, "in");
      logTranscript("SpeechDetected: server detected user speech", "in");
      return;
    }

    if (type === "AiTurnCompleted") {
      logSocket(raw, "in");
      logTranscript("AiTurnCompleted", "in");
      return;
    }

    if (type === "ClientError") {
      logSocket(raw, "in");
      const data = msg.Data || {};
      const code = data.Code || "Unknown";
      const text = data.Message || "No message";
      logSocket(`ClientError ${code}: ${text}`, "error");
      return;
    }

    logSocket(raw, "in");
  }

  async function connect() {
    const url = wsUrlEl.value.trim();
    if (!url) {
      logSocket("Please input websocket URL", "error");
      return;
    }

    try {
      setStatus("connecting", "Connecting...");
      const protocols = parseProtocols();
      ws = protocols.length > 0 ? new WebSocket(url, protocols) : new WebSocket(url);

      ws.onopen = () => {
        sentAudioChunks = 0;
        receivedAudioChunks = 0;
        setStatus("connected", "Connected");
        logSocket(`connected: ${url}`, "in");
        updateButtons();
      };

      ws.onmessage = (event) => {
        onServerMessage(String(event.data || ""));
      };

      ws.onerror = () => {
        logSocket("websocket error", "error");
      };

      ws.onclose = (event) => {
        setStatus("disconnected", `Disconnected (code: ${event.code})`);
        logSocket(`closed: code=${event.code}, reason=${event.reason || "none"}`, "error");
        stopMic().catch(() => {});
        ws = null;
        sentAudioChunks = 0;
        receivedAudioChunks = 0;
        updateButtons();
      };

      updateButtons();
    } catch (err) {
      setStatus("disconnected", "Connect failed");
      logSocket(`connect failed: ${err.message}`, "error");
      ws = null;
      updateButtons();
    }
  }

  function disconnect() {
    if (!ws) return;
    ws.close(1000, "Manual disconnect");
  }

  async function startMic() {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      logSocket("cannot start mic: websocket is not connected", "error");
      return;
    }

    if (micProcessor) return;

    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });

      micContext = new AudioContext();
      if (micContext.state !== "running") {
        await micContext.resume();
      }

      micSource = micContext.createMediaStreamSource(micStream);
      micProcessor = micContext.createScriptProcessor(4096, 1, 1);

      micProcessor.onaudioprocess = (event) => {
        if (!ws || ws.readyState !== WebSocket.OPEN) return;

        const input = event.inputBuffer.getChannelData(0);
        const downsampled = downsampleBuffer(input, micContext.sampleRate, TARGET_SAMPLE_RATE);
        const pcm16 = floatTo16BitPCM(downsampled);
        const base64 = arrayBufferToBase64(pcm16.buffer);

        sendAudioChunk(base64);
      };

      micSource.connect(micProcessor);
      micProcessor.connect(micContext.destination);

      logSocket(`mic started (input ${micContext.sampleRate}Hz -> output ${TARGET_SAMPLE_RATE}Hz pcm16)`, "in");
      updateButtons();
    } catch (err) {
      logSocket(`mic start failed: ${err.message}`, "error");
      await stopMic();
    }
  }

  async function stopMic() {
    if (micProcessor) {
      micProcessor.disconnect();
      micProcessor.onaudioprocess = null;
      micProcessor = null;
    }

    if (micSource) {
      micSource.disconnect();
      micSource = null;
    }

    if (micContext) {
      await micContext.close();
      micContext = null;
    }

    if (micStream) {
      micStream.getTracks().forEach(track => track.stop());
      micStream = null;
    }

    updateButtons();
  }

  function sendText() {
    const text = textInputEl.value.trim();
    if (!text) return;

    sendJson({ text });
    logTranscript(`You: ${text}`, "out");
    textInputEl.value = "";
  }

  connectBtn.addEventListener("click", () => { connect(); });
  disconnectBtn.addEventListener("click", () => { disconnect(); });
  startMicBtn.addEventListener("click", () => { startMic(); });
  stopMicBtn.addEventListener("click", () => { stopMic(); });
  sendTextBtn.addEventListener("click", () => { sendText(); });

  sendPingBtn.addEventListener("click", () => {
    sendJson({ text: "Hello, can you hear me?" });
  });

  textInputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      sendText();
    }
  });

  clearLogBtn.addEventListener("click", () => {
    socketLogEl.innerHTML = "";
    transcriptLogEl.innerHTML = "";
    sentAudioChunks = 0;
    receivedAudioChunks = 0;
  });

  setStatus("disconnected", "Disconnected");
  updateButtons();
</script>
</body>
</html>
